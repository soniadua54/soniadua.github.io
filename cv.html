<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonia Dua — CV</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23a855f7'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='18' fill='white'>S</text></svg>"/>
<style>
  :root{
    --ink:#1a1a1a;
    --muted:#5c5c5c;
    --line:#d9d9d9;
    --accent:#eef0f2;
    --accent-border:#d3d7db;
    --danger:#c0392b;
    --edit:#f4f7ff;
    --brand:#8b3fd1;
    --brand-bg:#f6effc;
    --brand-border:#e1c9f5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#e9ebee;
    color:var(--ink);
    padding-bottom:60px;
  }

  .top-links{ max-width:960px; margin:14px auto 0; padding:0 14px; display:flex; justify-content:space-between; align-items:center; }
  .top-links a{ font-size:12.5px; color:#3a54a8; text-decoration:none; }
  .top-links a:hover{ text-decoration:underline; }

  .page-wrap{ display:flex; justify-content:center; padding:14px 14px 26px; }
  .page{
    background:#fff; width:100%; max-width:960px;
    padding:34px 40px 42px;
    box-shadow:0 4px 20px rgba(0,0,0,0.12);
  }

  [contenteditable="true"]{ border-radius:4px; padding:1px 3px; margin:-1px -3px; }
  body.pf-devmode-on [data-field]:hover{ background:var(--edit); outline:1px dashed #a9bcf5; }
  body.pf-devmode-on [data-field]:focus{ background:var(--edit); outline:1px solid #3a6df0; }
  /* A field with genuinely empty content (e.g. an experience bullet whose
     optional "lead" prefix was left blank) collapses to zero width — there
     is nothing there to click, so it silently looks broken/uneditable
     rather than just empty. The placeholder text gives it real clickable
     area; :empty still matches correctly since generated ::before content
     isn't a real child node. Screen-only so it never leaks into the PDF. */
  @media screen{
    body.pf-devmode-on [data-field]:empty::before{
      content:"(click to add)"; opacity:.4; font-style:italic;
    }
  }

  .header-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  .name-block{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .name{ font-size:30px; font-weight:800; letter-spacing:-0.5px; }
  .role-title{ font-size:16px; color:var(--brand); font-weight:600; }
  .years-badge{ border:1.5px solid var(--brand); color:var(--brand); border-radius:5px; padding:6px 12px; font-size:12px; font-weight:700; white-space:nowrap; height:fit-content; }
  .contact-row{ display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12.5px; color:var(--muted); }
  .contact-item{ display:inline-flex; align-items:center; gap:5px; background:#fafafa; border:1px solid #eee; border-radius:14px; padding:3px 10px; }
  /* LinkedIn/Portfolio/LeetCode render as real anchors so they're clickable
     in the PDF. First pass matched them to the brand purple so they didn't
     fall back to the browser's default link blue — but that made them stand
     out more than the plain-text contact items next to them. Match the same
     muted gray as the rest of the contact row instead; still a real link
     (underline on hover), just not visually shouting. */
  .contact-item a{ color:var(--muted); text-decoration:none; }
  .contact-item a:hover{ text-decoration:underline; }

  hr.top-rule{ border:none; border-top:2.5px solid var(--brand); margin:14px 0 20px; }

  /* Deliberately single-column (no CSS grid/multi-column anywhere in this
     document). Most ATS platforms (Workday, SAP SuccessFactors, Taleo — the
     ones actually run by DE/NL corporates) extract PDF text in raw stream
     order, not visual order, so a multi-column resume risks interleaved,
     garbled text on upload. Single column reads correctly no matter how the
     parser walks it. */
  .col-single{ max-width:none; }

  section.block{ margin-bottom:18px; }
  .sec-title{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .sec-icon{ width:24px; height:24px; background:var(--brand-bg); border:1px solid var(--brand-border); color:var(--brand); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex:none; }
  .sec-title h2{ font-size:13px; letter-spacing:0.6px; text-transform:uppercase; font-weight:800; margin:0; color:#222; }
  .sec-title hr{ flex:1; border:none; border-top:1px solid var(--line); }

  .exp-item{ margin-bottom:16px; padding:8px 10px 10px 12px; border-radius:8px; border-left:3px solid var(--brand-border); position:relative; }
  .exp-title-line{ font-size:13.5px; }
  .exp-title-line b{ font-weight:700; }
  .exp-meta{ font-size:11.5px; color:var(--muted); margin-top:1px; font-style:italic; }
  .bullets{ margin:6px 0 4px 0; padding-left:18px; }
  .bullets li{ font-size:12.3px; line-height:1.5; margin-bottom:4px; position:relative; }
  .tech-line{ font-size:11.8px; margin-top:5px; color:#222; }
  .tech-line b{ font-weight:700; }
  .tag-list [data-repeat-item]:not(:last-child)::after{ content:", "; }

  .x-btn{ border:none; background:#f1e4e4; color:var(--danger); border-radius:50%; width:17px; height:17px; font-size:11px; line-height:1; cursor:pointer; flex:none; display:inline-flex; align-items:center; justify-content:center; }
  .x-btn:hover{ background:var(--danger); color:#fff; }
  .row-remove{ border:none; background:transparent; color:#bbb; cursor:pointer; font-size:13px; padding:2px 4px; border-radius:4px; }
  .row-remove:hover{ color:#fff; background:var(--danger); }
  .add-btn{ border:1px dashed #b7c3ea; background:#f5f7ff; color:#3a54a8; cursor:pointer; font-size:11.5px; border-radius:6px; padding:5px 10px; margin-top:4px; display:inline-flex; gap:5px; align-items:center; }
  .add-btn:hover{ background:#e9edff; }

  .profile-text{ font-size:12.3px; line-height:1.55; }
  #competenciesList{ font-size:12px; line-height:1.6; }
  .skill-cat{ margin-bottom:10px; position:relative; padding:4px 6px; border-radius:6px; }
  .skill-cat h4{ font-size:12px; font-weight:700; margin:0 0 3px; display:flex; justify-content:space-between; align-items:center; }
  .skill-cat .items-text{ font-size:12px; line-height:1.5; color:#222; }

  .edu-item, .cert-item, .ach-item, .ai-item, .proj-item{ margin-bottom:11px; padding:5px 6px; border-radius:6px; position:relative; }
  .edu-degree, .cert-title, .ach-title, .proj-title{ font-size:12.3px; font-weight:700; }
  /* cert-title is a heading-weight field (same size/weight as edu-degree,
     ach-title, proj-title) — kept at the default ink color so a linked cert
     title still reads as a section heading, not de-emphasized text. The
     contact-row and proj-link colors below are the ones matched to muted
     gray, since those are caption/secondary-level text to begin with. */
  .cert-title a{ color:var(--ink); text-decoration:none; }
  .cert-title a:hover{ text-decoration:underline; }
  .edu-school{ font-size:12px; margin-top:1px; }
  .edu-meta, .cert-meta{ font-size:11px; color:var(--muted); margin-top:1px; }
  .edu-details, .ach-text, .proj-desc{ font-size:11.8px; line-height:1.5; margin-top:2px; }
  .proj-link{ font-size:10.5px; margin-top:2px; display:block; }
  .proj-link a{ color:var(--muted); text-decoration:none; word-break:break-all; }
  .proj-link a:hover{ text-decoration:underline; }
  /* Internal/proprietary projects (most enterprise work) have no honest
     public URL to link — an empty href="" anchor would either render as
     dead blank space or, worse, silently link back to the page itself.
     Collapse it entirely on the live/print page when empty; Dev Mode still
     shows it via the standard [data-field]:empty "(click to add)" ghost
     text so there's somewhere to click if a real link (case study, blog
     post, video) is ever added later. */
  body:not(.pf-devmode-on) .proj-link a:empty{ display:none; }
  /* AI-Augmented Development renders as one flowing line per tool (name +
     freq badge + short desc, all inline) instead of a header line plus a
     separate description line below it — keeps the whole section to ~2-3
     lines total instead of ~4-6. */
  .ai-item{ font-size:11.8px; line-height:1.6; }
  .ai-item b{ font-weight:700; }

  /* Languages render as one compact flowing line ("Name (Level) · Name
     (Level) …") instead of a stacked block per language — same repeat-item/
     remove-button mechanics as everywhere else, just an inline presentation. */
  .lang-inline{ display:flex; flex-wrap:wrap; gap:0 4px; font-size:12px; }
  .lang-item{ position:relative; padding:2px 4px 2px 2px; border-radius:5px; display:inline-flex; align-items:baseline; gap:3px; }
  .lang-item .lang-name{ font-weight:700; }
  .lang-item .lang-level{ color:var(--muted); }
  .lang-inline .lang-item:not(:last-child)::after{ content:"·"; color:var(--accent-border); margin-left:5px; font-weight:700; }
  .ai-freq{ font-size:9.5px; background:#222; color:#fff; padding:1px 6px; border-radius:9px; letter-spacing:.4px; margin-left:3px; }
  .row-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }

  /* dev-mode add/remove/reorder affordances (reuses the same visual language as the portfolio) */
  .pf-item{ position:relative; }
  .pf-just-added{ animation:pfJustAdded 1.6s ease-out; }
  @keyframes pfJustAdded{
    0%{ box-shadow:0 0 0 3px rgba(139,63,209,0.9); }
    100%{ box-shadow:0 0 0 3px rgba(139,63,209,0); }
  }
  /* Positioned just inside the item's own box (not overhanging past its edge)
     so it can never overlap a neighboring item's content in the CV's tighter
     vertical rhythm. Every item's controls live in ONE wrapper so they can
     never land on top of a different item's wrapper (see cv-devmode.js). */
  .pf-item-controls{ position:absolute; top:2px; right:2px; z-index:5; display:flex; gap:3px; }
  .pf-remove-btn, .pf-move-btn{ width:18px; height:18px; border-radius:50%; border:none; font-size:9px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .pf-remove-btn{ background:#c0392b; color:#fff; font-size:10px; }
  .pf-move-btn{ background:#2f6fb0; color:#fff; }
  .pf-move-btn:disabled{ opacity:.25; cursor:default; box-shadow:none; }
  /* Compact items (plain-text tags in the ATS tag-list) have no room for an
     overlaid corner button — a short tag like "Java" is narrower than the
     button itself, so an absolutely-positioned ✕ would sit directly on top
     of the only text there is to click. Render it in normal flow instead,
     pushing the text over rather than covering it. */
  .pf-item-controls-compact{ position:static; display:inline-flex; vertical-align:middle; margin-right:3px; }
  .pf-item-controls-compact .pf-remove-btn{ width:13px; height:13px; font-size:8px; }
  /* Full ▲/▼/✕ cluster laid out in normal flow after the text, for
     free-text pills (contact-row extras) where an overlaid corner button
     would clip the tail of the text instead of sitting cleanly beside it. */
  .pf-item-controls-inline-end{ position:static; display:inline-flex; vertical-align:middle; margin-left:6px; }
  .pf-add-btn{ display:inline-flex; align-items:center; gap:5px; margin:6px 4px 4px 0; font-family:inherit; font-size:11.5px; border:1px dashed #b7c3ea; background:#f5f7ff; color:#3a54a8; border-radius:6px; padding:5px 10px; cursor:pointer; }
  .pf-add-btn:hover{ background:#e9edff; }
  .pf-add-menu{ z-index:9999; background:#fff; border:1px solid var(--brand-border); border-radius:8px; padding:6px; display:flex; flex-direction:column; gap:4px; box-shadow:0 8px 24px rgba(0,0,0,.18); }
  .pf-add-menu button{ text-align:left; background:transparent; border:none; color:#222; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-family:inherit; white-space:nowrap; }
  .pf-add-menu button:hover{ background:var(--brand-bg); }

  @media print{
    body{ background:#fff; padding:0; }
    .no-print{ display:none !important; }
    .top-links{ display:none; }
    .page-wrap{ padding:0; }
    .page{ box-shadow:none; max-width:none; width:100%; padding:0; }
    [contenteditable="true"]:hover, [contenteditable="true"]:focus{ background:transparent; outline:none; }

    .name{ font-size:20px; }
    .role-title{ font-size:12px; }
    .years-badge{ padding:3px 8px; font-size:9.5px; }
    .contact-row{ gap:8px; margin-top:4px; font-size:9.5px; }
    .contact-item{ padding:1.5px 6px 1.5px 5px; }
    hr.top-rule{ margin:5px 0 7px; border-top-width:2px; }
    section.block{ margin-bottom:7px; }
    .sec-title{ margin-bottom:3px; gap:6px; }
    .sec-icon{ width:15px; height:15px; font-size:9px; }
    .sec-title h2{ font-size:9.8px; letter-spacing:.3px; }

    .exp-item{ margin-bottom:5px; padding:0 0 0 8px; border-left-width:2px; }
    .exp-title-line{ font-size:11px; }
    .exp-meta{ font-size:9.4px; margin-top:0; }
    .bullets{ margin:1.5px 0 1.5px 0; padding-left:14px; }
    .bullets li{ font-size:9.6px; line-height:1.24; margin-bottom:1px; }
    .tech-line{ font-size:9.1px; margin-top:1.5px; }

    .profile-text{ font-size:9.6px; line-height:1.28; }
    #competenciesList{ font-size:9.2px; line-height:1.32; }
    .skill-cat{ margin-bottom:3px; padding:0; }
    .skill-cat h4{ font-size:9.5px; margin-bottom:1px; }
    .skill-cat .items-text{ font-size:9.2px; line-height:1.26; }

    .edu-item, .cert-item, .ach-item, .ai-item, .proj-item{ margin-bottom:3px; padding:0; }
    .edu-degree, .cert-title, .ach-title, .proj-title{ font-size:9.6px; }
    .edu-school{ font-size:9.2px; }
    .edu-meta, .cert-meta{ font-size:8.6px; }
    .edu-details, .ach-text, .proj-desc{ font-size:9px; line-height:1.24; margin-top:1px; }
    .proj-link{ font-size:8.2px; margin-top:1px; }
    .ai-item{ font-size:9px; line-height:1.3; }
    .ai-freq{ font-size:7.4px; padding:1px 5px; }

    .lang-inline{ font-size:9.5px; gap:0 3px; }
    .lang-item{ padding:1px 2px; }

    /* Right now everything is tuned to fit exactly one page, so none of
       this currently fires — but the moment more content is added (a
       custom section, another role, more bullets) and the CV genuinely
       spans 2 pages, the browser's default pagination happily slices a
       page break through the MIDDLE of any element — half a bullet's
       sentence on page 1, the rest on page 2; half of one experience
       entry's bullets under the role title, the other half orphaned under
       nothing at the top of the next page. break-inside:avoid forces each
       of these atomic blocks to move to the next page as a whole instead
       of being sliced. The section CONTAINER itself (section.block) is
       deliberately NOT in this list — forcing an entire multi-entry
       section like Experience to jump to a new page just because it
       doesn't fully fit would waste most of the previous page; only the
       individual entries within it need to stay intact.
       page-break-inside is the pre-standard alias some PDF/print engines
       still key off of — both are set for the same rule for safety. */
    .exp-item, .edu-item, .cert-item, .ach-item, .ai-item, .skill-cat,
    .bullets li, .custom-section, .proj-item{
      break-inside:avoid; page-break-inside:avoid;
    }
    /* Best-effort: don't leave a section header alone at the bottom of a
       page with its own content pushed to the next one. */
    .sec-title{ break-after:avoid; page-break-after:avoid; }

    /* Dev Mode's own UI (add/remove/move buttons, the "(click to add)"
       ghost text, and the toolbar) must never appear in a printed/PDF
       output.
       !important because pf-devui's own display toggle is inline style
       (element.style.display), which normally wins over a stylesheet rule
       of equal or lower specificity — this must always override it in print. */
    .pf-devui, #pfDevToolbar{ display:none !important; }

    /* The "just added this item" purple highlight pulse (scrollToNewItem())
       is a box-shadow-driven CSS animation lasting 1.6s. If you print (or
       export the PDF) while it's still mid-pulse — genuinely possible
       right after clicking "+Add" — the box-shadow gets caught by print
       pagination's fragment-slicing: a box split across a page break
       renders its box-shadow/border on BOTH resulting fragments by
       default, so a soon-to-fade purple ring around the new item shows up
       as a stray horizontal bar at the bottom of one page AND again at the
       bottom of wherever the fragment continues — with no visible text
       nearby to explain it, since the item's actual content moved whole to
       the next page (break-inside:avoid on .custom-section/.ach-item is
       working correctly) while the shadow's sliced remainder was left
       behind. Force it off unconditionally for print — the highlight is a
       screen-only "look here" affordance with no purpose on paper anyway. */
    .pf-just-added{ animation:none !important; box-shadow:none !important; }
  }
  @page{ size:A4; margin:5.2mm; }

  /* dev toolbar (shared visual language with the portfolio's) */
  #pfDevToolbar{ position:fixed; left:0; right:0; bottom:0; z-index:9997; background:#0d1117; border-top:1px solid #a855f7; font-family:-apple-system,sans-serif; }
  .pf-devbar-inner{ max-width:1400px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; color:#eef0ff; }
  .pf-devbar-title{ font-weight:700; font-size:13px; white-space:nowrap; }
  .pf-devbar-hint{ font-size:11.5px; color:#94a3b8; margin-right:auto; }
  #pfTokenInput{ font-size:12px; padding:7px 10px; border-radius:6px; border:1px solid #333c4d; background:#161b22; color:#eef0ff; width:200px; }
  .pf-devbtn{ background:#21262d; color:#eef0ff; border:1px solid #333c4d; border-radius:6px; padding:7px 12px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .pf-devbtn:hover{ background:#30363d; }
  .pf-devbtn-primary{ background:#a855f7; border-color:#a855f7; }
  .pf-devbtn-primary:hover{ background:#9333ea; }
  .pf-devbtn-danger{ background:#3a2020; border-color:#5c2b2b; }
  .pf-devlog{ font-size:11.5px; color:#94a3b8; max-width:320px; }
  .pf-devlog-error{ color:#f87171; }
  body.pf-devmode-on{ padding-bottom:64px; }
</style>
</head>
